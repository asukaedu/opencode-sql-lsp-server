name: CI

on:
  push:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
      code_changed: ${{ steps.filter.outputs.code_changed }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect docs-only vs code changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs_only:
              - 'README.md'
              - 'docs/**'
              - '**/*.md'
            code_changed:
              - '.github/workflows/**'
              - 'extensions/**'
              - 'pyproject.toml'
              - 'scripts/**'
              - 'src/**'
              - 'tests/**'

  quick-validate:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run fast verification ladder
        run: bash scripts/verify_fast.sh

  validate:
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest suite
        run: python -m pytest -m "not smoke"

      - name: Run smoke stdio test
        run: python tests/smoke_lsp_stdio.py

      - name: Run basedpyright
        run: python -m basedpyright src/opencode_sql_lsp_server

      - name: Build distribution
        run: bash scripts/build_dist.sh

  vscode-wrapper-validate:
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify VS Code wrapper
        run: bash scripts/verify_vscode_wrapper.sh

  docs-validate:
    needs: changes
    if: ${{ needs.changes.outputs.docs_only == 'true' && needs.changes.outputs.code_changed != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run docs consistency checks
        run: python -m pytest tests/test_docs_consistency.py -q
